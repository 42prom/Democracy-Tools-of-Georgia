version: "3.8"

# =============================================================================
# DTG Docker Compose - Full Application Stack
# =============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: dtg-postgres
    environment:
      POSTGRES_DB: dtg
      POSTGRES_USER: dtg_user
      POSTGRES_PASSWORD: dtg_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtg_user -d dtg"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: dtg-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  biometric-service:
    build: ./biometric-service
    container_name: dtg-biometric-service
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: always

  backend:
    build: ./backend
    container_name: dtg-backend
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://dtg_user:dtg_dev_password@postgres:5432/dtg
      - REDIS_URL=redis://redis:6379/0
      - BIOMETRIC_SERVICE_URL=http://biometric-service:8000
      - JWT_SECRET=CHANGE_ME_IN_PRODUCTION_USE_RANDOM_64_CHAR_STRING
      - PN_HASH_SECRET=a1b2c3d4e5f678901234567890abcdef1234567890abcdef1234567890abcdef
      - API_KEY_ENCRYPTION_SECRET=f1e2d3c4b5a697801234567890abcdef1234567890abcdef1234567890abcdef
      - DEVICE_HASH_SECRET=1a2b3c4d5e6f78901234567890abcdef1234567890abcdef1234567890abcdef
      - VOTER_HASH_SECRET=9a8b7c6d5e4f32101234567890abcdef1234567890abcdef1234567890abcdef
      - CORS_ORIGIN=http://localhost:5173
      - MIN_K_ANONYMITY=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  dtg-shield-service:
    build: ./dtg-shield-service
    container_name: dtg-shield-service
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_URL=http://backend:3000
      - BLOCK_THRESHOLD=100
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 1s
      timeout: 5s
      retries: 3
      start_period: 1s
    restart: always

  admin:
    build: ./admin
    container_name: dtg-admin
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://dtg-shield-service:8080
    depends_on:
      - dtg-shield-service
    restart: always

volumes:
  postgres_data:
  redis_data:
